<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Profile Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  </head>
  <body style="font-family: 'Poppins', sans-serif;" class="min-h-screen flex flex-col justify-center items-center p-6 bg-gradient-to-br from-purple-500 via-pink-500 to-red-500">
    <h1 class="text-5xl font-bold mb-8 text-white text-center drop-shadow-lg">GitHub Profile Viewer</h1>


    <div class="w-full max-w-xl flex mb-6 shadow-lg">
      <input
        id="usernameInput"
        type="text"
        placeholder="Enter GitHub Username"
        class="flex-1 p-3 border rounded-l-lg focus:outline-none text-gray-700"
      />
      <button
        onclick="fetchProfile()"
        class="bg-white text-black px-6 rounded-r-lg font-semibold hover:bg-gray-200 transition"
      >
        Search
      </button>
    </div>

   
    <div
      id="profileCard"
      class="w-full max-w-xl bg-white/90 backdrop-blur-md shadow-xl rounded-lg p-6 hidden"
    >
      <div class="flex items-center space-x-4">
        <img id="avatar" class="w-20 h-20 rounded-full" />
        <div>
          <h2 id="name" class="text-xl font-bold"></h2>
          <p id="username" class="text-gray-600"></p>
          <p id="joinDate" class="text-gray-500 text-sm"></p>
        </div>
      </div>

      <div class="grid grid-cols-4 gap-4 text-center mt-6">
        <div class="p-3 bg-gray-100 rounded">
          <p class="font-bold" id="reposCount"></p>
          <p class="text-gray-600 text-sm">Repos</p>
        </div>
        <div class="p-3 bg-gray-100 rounded">
          <p class="font-bold" id="followersCount"></p>
          <p class="text-gray-600 text-sm">Followers</p>
        </div>
        <div class="p-3 bg-gray-100 rounded">
          <p class="font-bold" id="followingCount"></p>
          <p class="text-gray-600 text-sm">Following</p>
        </div>
        <div class="p-3 bg-gray-100 rounded">
          <p class="font-bold" id="starsCount"></p>
          <p class="text-gray-600 text-sm">Stars</p>
        </div>
      </div>

      <h3 class="text-lg font-bold mt-6 mb-3">Repositories</h3>
      <div id="reposList" class="space-y-3"></div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
