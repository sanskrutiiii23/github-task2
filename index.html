<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Profile Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen flex flex-col items-center p-6">
    <h1 class="text-3xl font-bold mb-6">GitHub Profile Viewer</h1>


    <div class="w-full max-w-xl flex mb-6">
      <input
        id="usernameInput"
        type="text"
        placeholder="Enter GitHub Username"
        class="flex-1 p-3 border rounded-l-lg focus:outline-none"
      />
      <button
        onclick="fetchProfile()"
        class="bg-black text-white px-6 rounded-r-lg"
      >
        Search
      </button>
    </div>

   
    <div
      id="profileCard"
      class="w-full max-w-xl bg-white shadow-md rounded-lg p-6 hidden"
    >
      <div class="flex items-center space-x-4">
        <img id="avatar" class="w-20 h-20 rounded-full" />
        <div>
          <h2 id="name" class="text-xl font-bold"></h2>
          <p id="username" class="text-gray-600"></p>
          <p id="joinDate" class="text-gray-500 text-sm"></p>
        </div>
      </div>

      <div class="grid grid-cols-4 gap-4 text-center mt-6">
        <div class="p-3 bg-gray-100 rounded">
          <p class="font-bold" id="reposCount"></p>
          <p class="text-gray-600 text-sm">Repos</p>
        </div>
        <div class="p-3 bg-gray-100 rounded">
          <p class="font-bold" id="followersCount"></p>
          <p class="text-gray-600 text-sm">Followers</p>
        </div>
        <div class="p-3 bg-gray-100 rounded">
          <p class="font-bold" id="followingCount"></p>
          <p class="text-gray-600 text-sm">Following</p>
        </div>
        <div class="p-3 bg-gray-100 rounded">
          <p class="font-bold" id="starsCount"></p>
          <p class="text-gray-600 text-sm">Stars</p>
        </div>
      </div>

      <h3 class="text-lg font-bold mt-6 mb-3">Repositories</h3>
      <div id="reposList" class="space-y-3"></div>
    </div>

    <script src="index.js">
   
    </script>
  </body>
</html>
